<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Login QA Beginner Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <section class="dashboard-panel" aria-labelledby="dashboard-title">
      <p class="eyebrow">Login Success</p>
      <h1 id="dashboard-title">Dashboard</h1>
      <p class="helper-text">ยินดีต้อนรับ <strong id="userEmail">-</strong></p>
      <p class="session-note" id="rememberStatus"></p>
      <button class="primary-button" id="logoutButton" type="button">Logout</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
