<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login QA Beginner Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <section class="login-panel" aria-labelledby="login-title">
      <div class="brand-block">
        <p class="eyebrow">QA Practice App</p>
        <h1 id="login-title">เข้าสู่ระบบ</h1>
        <p class="helper-text">เว็บตัวอย่างสำหรับฝึกเขียน Manual Test Case</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="tester@example.com">
          <p class="error-message" id="emailError"></p>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="password-row">
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Test1234!">
            <button type="button" class="ghost-button" id="togglePassword">Show</button>
          </div>
          <p class="error-message" id="passwordError"></p>
        </div>

        <label class="checkbox-row">
          <input id="rememberMe" type="checkbox">
          <span>Remember me</span>
        </label>

        <button class="primary-button" type="submit">Login</button>
        <p class="form-message" id="formMessage" role="alert"></p>
      </form>

      <a class="forgot-link" href="#" id="forgotPassword">Forgot Password?</a>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
